name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE_NAME: kalipeh-wallet
  REGION: us-central1
  PROJECT_ID: kalipeh

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ AUTH (FIXED: correct provider format)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/525776555218/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "kalipeh-svc-sa@kalipeh.iam.gserviceaccount.com"

      # ✅ SET PROJECT EXPLICITLY
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: kalipeh

      # ✅ DOCKER AUTH
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ✅ BUILD + PUSH (FIXED REPO NAME)
      - name: Build and push image
        env:
          IMAGE: us-central1-docker.pkg.dev/kalipeh/kalipeh-wallet/kalipeh-wallet
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # ✅ DEPLOY
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: kalipeh-wallet
          region: us-central1
          image: us-central1-docker.pkg.dev/kalipeh/kalipeh-wallet/kalipeh-wallet:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --region=us-central1